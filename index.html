<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAILY — GLLRY</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FF2D2D'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>
<style>
  :root {
    --accent: #FF2D2D;
    --bg: #F5F5F5;
    --text: #111;
    --text-muted: #888;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.15);
    --hover: rgba(0,0,0,0.06);
    --dot: rgba(0,0,0,0.15);
    --dot-hover: rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.05em;
    overflow-x: hidden;
  }

  /* BIG FIXED CIRCLE */
  .fixed-circle {
    position: fixed;
    width: 55vw;
    height: 55vw;
    max-width: 700px;
    max-height: 700px;
    border-radius: 50%;
    background: var(--accent);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
    opacity: 0.92;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }

  .header-left {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  .tag {
    color: var(--text-muted);
    font-size: 11px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 61px;
    z-index: 99;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  button, label {
    font-family: 'Roboto Mono', monospace;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text);
    padding: 8px 14px;
    border-radius: 4px;
    transition: all 0.15s ease;
  }

  button:hover, label:hover {
    background: var(--hover);
  }

  button.active {
    background: var(--text);
    color: var(--bg);
  }

  .btn-accent {
    background: var(--accent) !important;
    color: #fff !important;
  }

  .btn-accent:hover {
    opacity: 0.85;
  }

  .btn-outline {
    border: 1px solid var(--border-strong);
  }

  .color-picker-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .color-picker-wrap input[type="color"] {
    -webkit-appearance: none;
    border: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    overflow: hidden;
  }

  .color-picker-wrap input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
  }

  .color-picker-wrap input[type="color"]::-webkit-color-swatch {
    border: 2px solid var(--border-strong);
    border-radius: 50%;
  }

  #file-input { display: none; }

  .upload-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  /* MASONRY */
  .masonry {
    position: relative;
    z-index: 1;
    padding: 44px;
    columns: 3;
    column-gap: 44px;
  }

  .masonry-item {
    break-inside: avoid;
    margin-bottom: 44px;
    cursor: pointer;
    transition: transform 0.2s ease;
    position: relative;
  }

  .masonry-item:hover {
    transform: scale(1.015);
  }

  .masonry-item img {
    width: 100%;
    display: block;
  }

  @media (max-width: 1100px) { .masonry { columns: 3; } }
  @media (max-width: 750px) { .masonry { columns: 2; } }
  @media (max-width: 450px) { .masonry { columns: 1; padding: 16px 12px; } }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
  }

  .lightbox.open { display: flex; }

  .lightbox-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
  }

  .lightbox-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 40px;
    overflow: hidden;
  }

  .lightbox-img-wrap {
    position: relative;
    max-width: 75vw;
    max-height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-img-wrap img {
    max-width: 100%;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 4px;
    position: relative;
    z-index: 2;
  }

  .lightbox-circle {
    position: absolute;
    width: 85%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: var(--accent);
    z-index: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.92;
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 24px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 16px;
    user-select: none;
    transition: color 0.15s;
    z-index: 10;
    background: none;
    border: none;
    font-family: 'Roboto Mono', monospace;
  }

  .lightbox-nav:hover { color: var(--text); background: none; }
  .lightbox-nav.prev { left: 24px; }
  .lightbox-nav.next { right: 24px; }

  .lightbox-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 24px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dot);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    padding: 0;
  }

  .dot:hover { background: var(--dot-hover); }
  .dot.active { background: var(--accent); }

  .lightbox-counter {
    color: var(--text-muted);
    font-size: 11px;
  }

  /* EMPTY STATE */
  .empty-state {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    gap: 16px;
    z-index: 2;
  }

  .empty-state svg { opacity: 0.5; stroke: #fff; }
  .empty-state span { color: #fff; }

  /* PUBLISH OVERLAY */
  .publish-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  .publish-overlay.open { display: flex; }

  .publish-modal {
    background: var(--bg);
    border-radius: 8px;
    padding: 40px;
    max-width: 480px;
    width: 90%;
  }

  .publish-modal h2 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }

  .publish-modal p {
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .publish-modal input[type="text"] {
    width: 100%;
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    outline: none;
  }

  .publish-modal input[type="text"]:focus { border-color: var(--accent); }

  .publish-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .image-count {
    color: var(--text-muted);
    font-size: 11px;
  }

  /* DRAG & DROP */
  .drop-zone {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .drop-zone.active { display: flex; }

  .drop-zone-inner {
    border: 2px dashed var(--accent);
    border-radius: 12px;
    padding: 60px 80px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  /* GYRO 3D VIEW */
  .gyro {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow: hidden;
  }

  .gyro.open { display: block; }

  .gyro canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .gyro-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px;
    z-index: 50;
    pointer-events: none;
  }

  .gyro-header > * { pointer-events: auto; }

  .gyro-preview {
    position: absolute;
    bottom: 32px;
    left: 32px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .gyro-preview img {
    width: 120px;
    height: 80px;
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transition: opacity 0.2s;
  }

  .gyro-preview span {
    font-size: 10px;
    color: var(--text-muted);
  }

  .gyro-hint {
    position: absolute;
    bottom: 32px;
    right: 32px;
    z-index: 50;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .gyro-hint .dot-pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease infinite;
  }

  .gyro-lightbox {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    pointer-events: none;
    transition: background 0.4s ease;
    perspective: 900px;
  }
  .gyro-lightbox.open {
    pointer-events: auto;
    background: rgba(0,0,0,0.85);
  }
  .gyro-lightbox img {
    max-width: 85vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    opacity: 0;
    transform: rotateX(8deg) rotateY(-4deg) scale(0.85) translateZ(-60px);
    transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .gyro-lightbox.open img {
    opacity: 1;
    transform: rotateX(0) rotateY(0) scale(1) translateZ(0);
  }
  .gyro-lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(-8px);
    transition: background 0.2s, opacity 0.35s ease 0.15s, transform 0.35s ease 0.15s;
  }
  .gyro-lightbox.open .gyro-lightbox-close {
    opacity: 1;
    transform: translateY(0);
  }
  .gyro-lightbox-close:hover { background: rgba(255,255,255,0.25); }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- BIG FIXED CIRCLE -->
<div class="fixed-circle" id="fixed-circle"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-left">DAILY — GLLRY</div>
  <div class="header-right">
    <span class="tag" id="header-date"></span>
    <span class="tag">#CT-DESIGN</span>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <button id="btn-grid" class="active" onclick="setView('grid')">Grid</button>
    <button id="btn-single" onclick="setView('single')">Single</button>
    <button id="btn-gyro" onclick="setView('gyro')">Gyro</button>
    <span class="image-count" id="image-count">0 images</span>
  </div>
  <div class="toolbar-right">
    <div class="color-picker-wrap">
      <input type="color" id="bg-color" value="#F5F5F5" title="Background color">
    </div>
    <div class="color-picker-wrap">
      <input type="color" id="accent-color" value="#FF2D2D" title="Accent color">
    </div>
    <button class="btn-outline" onclick="shuffleImages()">Shuffle</button>
    <label class="upload-label btn-outline" for="file-input">+ Upload</label>
    <input type="file" id="file-input" multiple accept="image/*">
    <button class="btn-accent" onclick="openPublish()">Publish</button>
  </div>
</div>

<!-- MASONRY GRID -->
<main id="grid-view">
  <div class="masonry" id="masonry"></div>
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span>Drop images or click upload</span>
  </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-header">
    <div class="header-left">DAILY — GLLRY</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="lightbox-counter" id="lightbox-counter">1 / 1</span>
      <button onclick="closeLightbox()">Close</button>
    </div>
  </div>
  <div class="lightbox-body">
    <button class="lightbox-nav prev" onclick="navImage(-1)">&lt;</button>
    <div class="lightbox-img-wrap">
      <div class="lightbox-circle"></div>
      <img id="lightbox-img" src="" alt="">
    </div>
    <button class="lightbox-nav next" onclick="navImage(1)">&gt;</button>
  </div>
  <div class="lightbox-dots" id="lightbox-dots"></div>
</div>

<!-- GYRO 3D VIEW -->
<div class="gyro" id="gyro">
  <div id="gyro-canvas"></div>
  <div class="gyro-header">
    <div class="header-left">DAILY — GLLRY</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="tag" id="gyro-counter"></span>
      <button onclick="setView('grid')">Close</button>
    </div>
  </div>
  <div class="gyro-preview">
    <img id="gyro-preview-img" src="" alt="">
    <span id="gyro-preview-label"></span>
  </div>
  <div class="gyro-hint">
    <span class="dot-pulse"></span>
    Drag to rotate — Scroll to spin
  </div>
  <div class="gyro-lightbox" id="gyro-lightbox" onclick="window.closeGyroLightbox()">
    <img id="gyro-lightbox-img" src="" alt="">
    <button class="gyro-lightbox-close" onclick="event.stopPropagation(); window.closeGyroLightbox()">Close</button>
  </div>
</div>

<!-- PUBLISH OVERLAY -->
<div class="publish-overlay" id="publish-overlay" onclick="closePublish(event)">
  <div class="publish-modal" onclick="event.stopPropagation()">
    <h2>Publish Gallery</h2>
    <p>Export your gallery as a ZIP with index.html + images folder. Ready to deploy.</p>
    <input type="text" id="gallery-title" placeholder="Gallery title" value="DAILY GLLRY #1">
    <input type="text" id="gallery-tag" placeholder="#tag" value="#CT-DESIGN">
    <input type="text" id="gallery-date" placeholder="Date (e.g. MAR 31 26)" value="">
    <div class="publish-actions">
      <button class="btn-outline" onclick="closePublish()">Cancel</button>
      <button class="btn-accent" onclick="publishGallery()">Export ZIP</button>
    </div>
  </div>
</div>

<!-- DROP ZONE -->
<div class="drop-zone" id="drop-zone">
  <div class="drop-zone-inner">Drop images here</div>
</div>

<script>
  let images = [];
  let currentIndex = 0;
  let currentView = 'grid';

  // COLORS
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r, g, b };
  }

  function getLuminance(hex) {
    const { r, g, b } = hexToRgb(hex);
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  }

  function updateUIColors(bgHex) {
    const root = document.documentElement;
    const isDark = getLuminance(bgHex) < 0.5;
    if (isDark) {
      root.style.setProperty('--text', '#f0f0f0');
      root.style.setProperty('--text-muted', '#999');
      root.style.setProperty('--border', 'rgba(255,255,255,0.1)');
      root.style.setProperty('--border-strong', 'rgba(255,255,255,0.2)');
      root.style.setProperty('--hover', 'rgba(255,255,255,0.08)');
      root.style.setProperty('--dot', 'rgba(255,255,255,0.2)');
      root.style.setProperty('--dot-hover', 'rgba(255,255,255,0.4)');
    } else {
      root.style.setProperty('--text', '#111');
      root.style.setProperty('--text-muted', '#888');
      root.style.setProperty('--border', 'rgba(0,0,0,0.06)');
      root.style.setProperty('--border-strong', 'rgba(0,0,0,0.15)');
      root.style.setProperty('--hover', 'rgba(0,0,0,0.06)');
      root.style.setProperty('--dot', 'rgba(0,0,0,0.15)');
      root.style.setProperty('--dot-hover', 'rgba(0,0,0,0.3)');
    }
  }

  const bgInput = document.getElementById('bg-color');
  bgInput.addEventListener('input', (e) => {
    document.documentElement.style.setProperty('--bg', e.target.value);
    updateUIColors(e.target.value);
  });

  const accentInput = document.getElementById('accent-color');
  accentInput.addEventListener('input', (e) => {
    document.documentElement.style.setProperty('--accent', e.target.value);
  });

  // DATE
  function formatDate(d) {
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return months[d.getMonth()] + ' ' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getFullYear()).slice(-2);
  }
  const todayStr = formatDate(new Date());
  document.getElementById('header-date').textContent = todayStr;
  document.getElementById('gallery-date').value = todayStr;

  // FILE UPLOAD
  document.getElementById('file-input').addEventListener('change', (e) => {
    handleFiles(e.target.files);
    e.target.value = '';
  });

  // DRAG & DROP
  let dragCounter = 0;
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    document.getElementById('drop-zone').classList.add('active');
  });
  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) document.getElementById('drop-zone').classList.remove('active');
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    document.getElementById('drop-zone').classList.remove('active');
    handleFiles(e.dataTransfer.files);
  });

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          images.push({ src: e.target.result, w: img.width, h: img.height });
          renderGrid();
          updateCount();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function updateCount() {
    document.getElementById('image-count').textContent = images.length + ' image' + (images.length !== 1 ? 's' : '');
  }

  // RENDER MASONRY
  function renderGrid() {
    const masonry = document.getElementById('masonry');
    const empty = document.getElementById('empty-state');

    if (images.length === 0) {
      masonry.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }

    empty.style.display = 'none';
    masonry.innerHTML = '';

    images.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'masonry-item';
      item.onclick = () => openLightbox(i);

      const imgEl = document.createElement('img');
      imgEl.src = img.src;
      imgEl.alt = `Image ${i + 1}`;
      imgEl.loading = 'lazy';

      item.appendChild(imgEl);
      masonry.appendChild(item);
    });
  }

  // SHUFFLE
  function shuffleImages() {
    for (let i = images.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [images[i], images[j]] = [images[j], images[i]];
    }
    renderGrid();
  }

  // VIEW MODE
  function setView(mode) {
    currentView = mode;
    document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
    document.getElementById('btn-single').classList.toggle('active', mode === 'single');

  gyroScene = new THREE.Scene();
  gyroScene.background = bgColor;
  gyroScene.fog = new THREE.Fog(bgColor, 15, 35);

  // Camera
  gyroCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  gyroCamera.position.set(0, 4, 22);

  // Renderer
  gyroRenderer = new THREE.WebGLRenderer({ antialias: true });
  gyroRenderer.setSize(window.innerWidth, window.innerHeight);
  gyroRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(gyroRenderer.domElement);

  // Controls
  gyroControls = new OrbitControls(gyroCamera, gyroRenderer.domElement);
  gyroControls.enableZoom = false;
  gyroControls.enablePan = false;
  gyroControls.enableDamping = true;
  gyroControls.dampingFactor = 0.05;

  // Lighting
  gyroScene.add(new THREE.AmbientLight(0xffffff, 2));
  const dir = new THREE.DirectionalLight(0xffffff, 1.5);
  dir.position.set(5, 10, 10);
  gyroScene.add(dir);

  // Groups
  const parentGroup = new THREE.Group();
  gyroScene.add(parentGroup);
  parentGroup.rotation.x = -0.15;

  gyroScrollGroup = new THREE.Group();
  parentGroup.add(gyroScrollGroup);

  gyroAutoRotateGroup = new THREE.Group();
  gyroScrollGroup.add(gyroAutoRotateGroup);

  // Build cards from uploaded images
  const total = images.length;
  const cardWidth = 2.0;
  const cardHeight = 1.4;
  const geometry = new THREE.PlaneGeometry(cardWidth, cardHeight, 1, 1);
  const textureLoader = new THREE.TextureLoader();

  gyroMeshes = [];
  gyroTextures = [];

  const masonryImgs = document.querySelectorAll('#masonry img');

  images.forEach((img, i) => {
    const angle = (i / total) * Math.PI * 2;
    let tex;
    if (masonryImgs[i] && masonryImgs[i].complete) {
      tex = new THREE.Texture(masonryImgs[i]);
      tex.needsUpdate = true;
    } else {
      tex = textureLoader.load(img.src);
    }
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.generateMipmaps = true;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    gyroTextures.push(tex);

    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      map: tex,
      side: THREE.DoubleSide,
      roughness: 0.3,
      metalness: 0.2,
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.x = gyroRadius * Math.cos(angle);
    mesh.position.z = gyroRadius * Math.sin(angle);
    mesh.position.y = 0;
    mesh.lookAt(0, 0, 0);
    mesh.rotateY(Math.PI / 2);
    mesh.userData = { index: i, angle, src: img.src };

    gyroAutoRotateGroup.add(mesh);
    gyroMeshes.push(mesh);
  });

  // Raycaster
  gyroRaycaster = new THREE.Raycaster();
  gyroMouse = new THREE.Vector2(-100, -100);
  gyroTargetMouse = new THREE.Vector2(0, 0);
  gyroHovered = null;

  // Counter
  document.getElementById('gyro-counter').textContent = total + ' images';

  // Preview first image
  if (images.length > 0) {
    document.getElementById('gyro-preview-img').src = images[0].src;
    document.getElementById('gyro-preview-label').textContent = 'Image 1 / ' + total;
  }
}

function gyroOnMouseMove(e) {
  gyroTargetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  gyroTargetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function gyroOnWheel(e) {
  if (gyroLightboxOpen) return;
  gyroScrollGroup.rotation.y += e.deltaY * 0.002;
}

function gyroOnMouseDown(e) {
  gyroClickStart.x = e.clientX;
  gyroClickStart.y = e.clientY;
}

function gyroOnClick(e) {
  if (gyroLightboxOpen) return;
  const dx = e.clientX - gyroClickStart.x;
  const dy = e.clientY - gyroClickStart.y;
  if (Math.sqrt(dx * dx + dy * dy) > 5) return; // was a drag, not a click

  const clickMouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  gyroRaycaster.setFromCamera(clickMouse, gyroCamera);
  const intersects = gyroRaycaster.intersectObjects(gyroMeshes);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const lb = document.getElementById('gyro-lightbox');
    const lbImg = document.getElementById('gyro-lightbox-img');
    lbImg.src = obj.userData.src;
    lb.classList.add('open');
    gyroLightboxOpen = true;
  }
}

window.closeGyroLightbox = function() {
  document.getElementById('gyro-lightbox').classList.remove('open');
  gyroLightboxOpen = false;
};

function gyroOnResize() {
  if (!gyroCamera || !gyroRenderer) return;
  gyroCamera.aspect = window.innerWidth / window.innerHeight;
  gyroCamera.updateProjectionMatrix();
  gyroRenderer.setSize(window.innerWidth, window.innerHeight);
}

function gyroAnimate(target, prop, to, duration) {
  const start = target[prop];
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / (duration * 1000), 1);
    const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
    target[prop] = start + (to - start) * ease;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function gyroLoop() {
  gyroControls.update();

  if (!gyroLightboxOpen) {
  // Smooth mouse
  gyroMouse.x += (gyroTargetMouse.x - gyroMouse.x) * 0.1;
  gyroMouse.y += (gyroTargetMouse.y - gyroMouse.y) * 0.1;

  // Auto rotation
  gyroAutoRotateGroup.rotation.y -= 0.0005;
  }

  // Raycasting
  gyroRaycaster.setFromCamera(gyroMouse, gyroCamera);
  const intersects = gyroRaycaster.intersectObjects(gyroMeshes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (gyroHovered !== obj) {
      // Unhover previous
      if (gyroHovered) {
        const prev = gyroHovered;
        gyroAnimate(prev.scale, 'x', 1, 0.4);
        gyroAnimate(prev.scale, 'y', 1, 0.4);
        gyroAnimate(prev.scale, 'z', 1, 0.4);
        gyroAnimate(prev.position, 'x', gyroRadius * Math.cos(prev.userData.angle), 0.4);
        gyroAnimate(prev.position, 'z', gyroRadius * Math.sin(prev.userData.angle), 0.4);
      }
      gyroHovered = obj;
      // Hover new — pop out
      const hoverR = gyroRadius + 1.0;
      gyroAnimate(obj.scale, 'x', 1.2, 0.4);
      gyroAnimate(obj.scale, 'y', 1.2, 0.4);
      gyroAnimate(obj.scale, 'z', 1.2, 0.4);
      gyroAnimate(obj.position, 'x', hoverR * Math.cos(obj.userData.angle), 0.4);
      gyroAnimate(obj.position, 'z', hoverR * Math.sin(obj.userData.angle), 0.4);

      // Update preview
      const previewImg = document.getElementById('gyro-preview-img');
      const previewLabel = document.getElementById('gyro-preview-label');
      previewImg.style.opacity = '0';
      setTimeout(() => {
        previewImg.src = obj.userData.src;
        previewLabel.textContent = 'Image ' + (obj.userData.index + 1) + ' / ' + images.length;
        previewImg.style.opacity = '1';
      }, 200);
    }
  } else if (gyroHovered) {
    const prev = gyroHovered;
    gyroAnimate(prev.scale, 'x', 1, 0.4);
    gyroAnimate(prev.scale, 'y', 1, 0.4);
    gyroAnimate(prev.scale, 'z', 1, 0.4);
    gyroAnimate(prev.position, 'x', gyroRadius * Math.cos(prev.userData.angle), 0.4);
    gyroAnimate(prev.position, 'z', gyroRadius * Math.sin(prev.userData.angle), 0.4);
    gyroHovered = null;
  }

  gyroRenderer.render(gyroScene, gyroCamera);
  gyroRAF = requestAnimationFrame(gyroLoop);
}

window.openGyro = function() {
  if (images.length === 0) return;
  document.getElementById('gyro').classList.add('open');
  initGyro();
  window.addEventListener('mousemove', gyroOnMouseMove);
  window.addEventListener('mousedown', gyroOnMouseDown);
  window.addEventListener('click', gyroOnClick);
  window.addEventListener('wheel', gyroOnWheel, { passive: true });
  window.addEventListener('resize', gyroOnResize);
  gyroLoop();
};

window.closeGyro = function() {
  document.getElementById('gyro').classList.remove('open');
  window.removeEventListener('mousemove', gyroOnMouseMove);
  window.removeEventListener('mousedown', gyroOnMouseDown);
  window.removeEventListener('click', gyroOnClick);
  window.removeEventListener('wheel', gyroOnWheel);
  window.removeEventListener('resize', gyroOnResize);
  gyroLightboxOpen = false;
  document.getElementById('gyro-lightbox').classList.remove('open');
  if (gyroRAF) {
    cancelAnimationFrame(gyroRAF);
    gyroRAF = null;
  }
  // Cleanup
  if (gyroRenderer) {
    const container = document.getElementById('gyro-canvas');
    if (container.contains(gyroRenderer.domElement)) {
      container.removeChild(gyroRenderer.domElement);
    }
    gyroMeshes.forEach(m => { if (m.material) m.material.dispose(); });
    gyroTextures.forEach(t => t.dispose());
    if (gyroControls) gyroControls.dispose();
    gyroRenderer.dispose();
    gyroRenderer = null;
  }
};
</script>

</body>
</html>
